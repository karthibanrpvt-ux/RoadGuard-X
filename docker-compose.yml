services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: roadguard-backend
    environment:
      MODEL_PATH: /app/PotholeDetect.pt
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: roadguard-frontend
    depends_on:
      - backend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api/v1
    ports:
      - "3000:3000"
