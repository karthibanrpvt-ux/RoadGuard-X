name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Build, Validate, and Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build backend Docker image
        run: docker build -t roadguard-backend:ci .

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-backend.txt
          pip install pytest

      - name: Backend smoke check
        run: |
          python -c "from main import app; print(app.title)"

      - name: Run backend tests
        run: pytest tests/backend -q

      - name: Trigger deploy webhook (optional)
        env:
          DEPLOY_WEBHOOK_URL: ${{ secrets.DEPLOY_WEBHOOK_URL }}
        run: |
          if [ -z "$DEPLOY_WEBHOOK_URL" ]; then
            echo "DEPLOY_WEBHOOK_URL not configured. Skipping deploy webhook."
            exit 0
          fi

          curl -fsSL -X POST "$DEPLOY_WEBHOOK_URL"
