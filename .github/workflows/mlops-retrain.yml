name: MLOps Retrain Trigger

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

jobs:
  trigger-retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger backend retrain endpoint
        env:
          BACKEND_BASE_URL: ${{ secrets.BACKEND_BASE_URL }}
          MLOPS_API_TOKEN: ${{ secrets.MLOPS_API_TOKEN }}
        run: |
          if [ -z "$BACKEND_BASE_URL" ]; then
            echo "BACKEND_BASE_URL secret missing."
            exit 1
          fi

          if [ -z "$MLOPS_API_TOKEN" ]; then
            echo "MLOPS_API_TOKEN secret missing."
            exit 1
          fi

          curl -X POST "$BACKEND_BASE_URL/api/v1/mlops/retrain" \
            -H "Authorization: Bearer $MLOPS_API_TOKEN" \
            -H "Content-Type: application/json"
